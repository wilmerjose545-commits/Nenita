<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marjorie y Wilmer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── PANTALLA PRINCIPAL (admin) ── */
body { font-family: 'Lato', sans-serif; background: #1a0a0f; color: #f5e6d3; min-height: 100vh; }

#admin-view { display: block; }
#carta-view  { display: none; }

/* Header admin */
.admin-header {
  background: linear-gradient(135deg, #2d0a14 0%, #1a0a0f 100%);
  padding: 28px 20px 20px;
  text-align: center;
  border-bottom: 1px solid #5c2035;
}
.admin-header h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 2rem;
  color: #e8a598;
  text-shadow: 0 0 20px rgba(232,165,152,0.4);
}
.admin-header p { color: #9b7060; font-size: 0.85rem; margin-top: 6px; }

/* Grid de cartas */
.cartas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 20px 16px;
  max-width: 900px;
  margin: 0 auto;
}

.carta-card {
  border-radius: 16px;
  padding: 16px 12px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  position: relative;
  overflow: hidden;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.carta-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
.carta-card .card-num {
  position: absolute; top: 10px; right: 12px;
  font-size: 0.7rem; font-weight: 700; opacity: 0.7; letter-spacing: 1px;
}
.carta-card .card-date { font-size: 0.72rem; opacity: 0.8; margin-bottom: 4px; }
.carta-card .card-title { font-family: 'Dancing Script', cursive; font-size: 1.1rem; line-height: 1.2; }
.carta-card .card-tag {
  position: absolute; top: 10px; left: 12px;
  font-size: 0.65rem; background: rgba(255,255,255,0.15);
  padding: 2px 6px; border-radius: 20px;
}

/* Colores únicos para cada carta */
.t1  { background: linear-gradient(135deg, #1a3a4a, #0d5c70); color: #a8dce8; }
.t2  { background: linear-gradient(135deg, #4a1a2a, #8b3a52); color: #f0c4d4; }
.t3  { background: linear-gradient(135deg, #2a3a1a, #4a6e2a); color: #c4e0a0; }
.t4  { background: linear-gradient(135deg, #3a2a1a, #8b6040); color: #f0d0a0; }
.t5  { background: linear-gradient(135deg, #1a1a3a, #3a3a7a); color: #c0c0f0; }
.t6  { background: linear-gradient(135deg, #3a1a1a, #7a2a2a); color: #f0a0a0; }
.t7  { background: linear-gradient(135deg, #1a2a3a, #2a5a7a); color: #a0d0f0; }
.t8  { background: linear-gradient(135deg, #2a1a3a, #5a2a7a); color: #d0a0f0; }
.t9  { background: linear-gradient(135deg, #3a2a1a, #7a5a2a); color: #f0d0a0; }
.t10 { background: linear-gradient(135deg, #1a3a2a, #2a7a5a); color: #a0f0d0; }
.t11 { background: linear-gradient(135deg, #3a3a1a, #7a7a2a); color: #f0f0a0; }
.t12 { background: linear-gradient(135deg, #3a1a2a, #7a2a5a); color: #f0a0c0; }
.t13 { background: linear-gradient(135deg, #1a2a2a, #2a5a5a); color: #a0d0d0; }
.t14 { background: linear-gradient(135deg, #2a1a1a, #6a3a2a); color: #e0b0a0; }
.t15 { background: linear-gradient(135deg, #1a1a2a, #3a2a5a); color: #c0a0e0; }
.t16 { background: linear-gradient(135deg, #2a3a2a, #5a7a5a); color: #b0d0b0; }
.t17 { background: linear-gradient(135deg, #3a1a3a, #7a2a7a); color: #f0a0f0; }
.t18 { background: linear-gradient(135deg, #3a2a0a, #7a5a1a); color: #f0d080; }
.t19 { background: radial-gradient(ellipse at center, #5a0a1a, #1a0508); color: #ffd0d0; border: 1px solid #8b2030; }

/* Botones admin */
.admin-actions {
  padding: 0 16px 30px;
  max-width: 900px;
  margin: 0 auto;
}
.btn-primary {
  display: block; width: 100%; padding: 14px;
  background: linear-gradient(135deg, #8b3a52, #c96b5e);
  color: white; border: none; border-radius: 12px;
  font-family: 'Dancing Script', cursive; font-size: 1.2rem;
  cursor: pointer; text-align: center;
  box-shadow: 0 4px 15px rgba(201,107,94,0.4);
}
.btn-secondary {
  display: block; width: 100%; padding: 12px;
  background: transparent; color: #9b7060;
  border: 1px solid #5c2035; border-radius: 12px;
  font-size: 0.85rem; cursor: pointer; text-align: center; margin-top: 10px;
}

/* Modal editor */
.modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 1000;
  padding: 20px; overflow-y: auto;
}
.modal.open { display: flex; align-items: flex-start; justify-content: center; }
.modal-box {
  background: #1a0a0f; border: 1px solid #5c2035; border-radius: 20px;
  padding: 24px; width: 100%; max-width: 500px; margin: auto;
}
.modal-box h2 { font-family: 'Dancing Script', cursive; color: #e8a598; font-size: 1.4rem; margin-bottom: 4px; }
.modal-box p  { color: #9b7060; font-size: 0.8rem; margin-bottom: 16px; }
.modal-box textarea {
  width: 100%; min-height: 200px; background: #0d0508;
  border: 1px solid #5c2035; border-radius: 10px; color: #f5e6d3;
  padding: 12px; font-family: 'Lato', sans-serif; font-size: 0.9rem;
  line-height: 1.6; resize: vertical;
}
.modal-footer { display: flex; gap: 10px; margin-top: 14px; }
.modal-footer button {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  cursor: pointer; font-size: 0.9rem;
}
.btn-save { background: #8b3a52; color: white; }
.btn-cancel { background: #2a1015; color: #9b7060; border: 1px solid #5c2035; }

/* QR modal */
.qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
.qr-modal.open { display: flex; }
.qr-box {
  background: #1a0a0f; border: 1px solid #5c2035; border-radius: 20px;
  padding: 28px; width: 100%; max-width: 380px; text-align: center;
}
.qr-box h2 { font-family: 'Dancing Script', cursive; color: #e8a598; font-size: 1.6rem; margin-bottom: 6px; }
.qr-box p  { color: #9b7060; font-size: 0.8rem; margin-bottom: 20px; }
#qr-canvas { display: flex; justify-content: center; margin-bottom: 16px; }
#qr-canvas canvas { border-radius: 10px; }
.qr-url {
  background: #0d0508; border: 1px solid #5c2035; border-radius: 8px;
  padding: 10px; font-size: 0.75rem; color: #c96b5e; word-break: break-all;
  margin-bottom: 16px; text-align: left;
}
.qr-close { background: #2a1015; color: #9b7060; border: 1px solid #5c2035; border-radius: 10px; padding: 10px 24px; cursor: pointer; font-size: 0.9rem; }
.qr-copy  { background: #8b3a52; color: white; border: none; border-radius: 10px; padding: 10px 24px; cursor: pointer; font-size: 0.9rem; margin-right: 8px; }

/* ══════════════════════════════════════════════
   VISTA DE CARTA (lo que ella ve en su celular)
   ══════════════════════════════════════════════ */
#carta-view {
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Partículas flotantes */
.particle {
  position: fixed;
  pointer-events: none;
  animation: float-up linear infinite;
  opacity: 0;
  z-index: 0;
}
@keyframes float-up {
  0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
}

/* Contenedor carta */
.carta-wrapper {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px 60px;
}

.carta-sobre {
  width: 100%; max-width: 420px;
  border-radius: 24px; padding: 36px 28px;
  position: relative; overflow: hidden;
  animation: carta-in 1s ease both;
}
@keyframes carta-in {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

.carta-deco-top { text-align: center; margin-bottom: 20px; }
.carta-deco-emoji { font-size: 2rem; display: block; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

.carta-num-label {
  display: inline-block; padding: 4px 14px;
  border-radius: 20px; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; margin-top: 8px;
}

.carta-fecha {
  font-size: 0.8rem; opacity: 0.7; text-align: center;
  margin-bottom: 6px; letter-spacing: 1px;
}

.carta-titulo {
  font-family: 'Dancing Script', cursive;
  font-size: 1.9rem; text-align: center;
  margin-bottom: 20px; line-height: 1.2;
}

.carta-divider { text-align: center; font-size: 1rem; opacity: 0.5; margin: 16px 0; letter-spacing: 8px; }

.carta-texto {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; line-height: 1.85;
  white-space: pre-wrap;
}

.carta-firma {
  text-align: right; margin-top: 28px;
  font-family: 'Dancing Script', cursive;
  font-size: 1.3rem; opacity: 0.85;
}

.carta-back-btn {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.1); color: white;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 30px;
  padding: 10px 24px; font-size: 0.85rem; cursor: pointer;
  backdrop-filter: blur(10px); z-index: 10;
  display: none;
}

/* ── TEMAS ÚNICOS PARA CADA CARTA ── */

/* 1 — Océano profundo */
.tema-1 { background: linear-gradient(160deg, #0a2535 0%, #0d4a6e 50%, #0a6b8a 100%); color: #c8eaf5; }
.tema-1 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(100,200,240,0.2); box-shadow: 0 20px 60px rgba(0,150,200,0.2); }
.tema-1 .carta-num-label { background: rgba(100,200,240,0.15); color: #7dd4ec; }
.tema-1 .carta-titulo { color: #9de0f5; text-shadow: 0 0 30px rgba(100,200,240,0.5); }
.tema-1 .carta-divider { color: #7dd4ec; }

/* 2 — Terciopelo rosa */
.tema-2 { background: linear-gradient(160deg, #2d0a1a 0%, #5c1a33 50%, #8b2a4a 100%); color: #f5c8d8; }
.tema-2 .carta-sobre { background: rgba(255,255,255,0.07); border: 1px solid rgba(220,100,150,0.25); box-shadow: 0 20px 60px rgba(200,50,100,0.25); }
.tema-2 .carta-num-label { background: rgba(220,100,150,0.2); color: #f0a0c0; }
.tema-2 .carta-titulo { color: #ffd0e0; font-style: italic; }
.tema-2 .carta-divider { color: #f0a0c0; }

/* 3 — Bosque encantado */
.tema-3 { background: linear-gradient(160deg, #0a1a0d 0%, #143520 50%, #1e5230 100%); color: #c8f0d0; }
.tema-3 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(100,220,130,0.2); box-shadow: 0 20px 60px rgba(50,180,80,0.2); }
.tema-3 .carta-num-label { background: rgba(100,220,130,0.15); color: #80e0a0; }
.tema-3 .carta-titulo { color: #a0f0c0; }
.tema-3 .carta-divider { color: #80e0a0; }

/* 4 — Atardecer dorado */
.tema-4 { background: linear-gradient(160deg, #2a1000 0%, #6a3010 40%, #c06020 70%, #e09030 100%); color: #fff0d0; }
.tema-4 .carta-sobre { background: rgba(255,220,100,0.08); border: 1px solid rgba(255,180,50,0.25); box-shadow: 0 20px 60px rgba(200,100,20,0.3); }
.tema-4 .carta-num-label { background: rgba(255,180,50,0.2); color: #f0c060; }
.tema-4 .carta-titulo { color: #ffe090; text-shadow: 0 0 20px rgba(255,180,50,0.4); }
.tema-4 .carta-divider { color: #f0c060; }

/* 5 — Galaxia */
.tema-5 { background: radial-gradient(ellipse at 30% 40%, #1a0a3a, #08051a 70%); color: #d0c8f8; }
.tema-5 .carta-sobre { background: rgba(255,255,255,0.05); border: 1px solid rgba(150,120,255,0.2); box-shadow: 0 20px 60px rgba(100,60,200,0.2); }
.tema-5 .carta-num-label { background: rgba(150,120,255,0.15); color: #b0a0f0; }
.tema-5 .carta-titulo { color: #d0c0ff; text-shadow: 0 0 30px rgba(150,100,255,0.5); }
.tema-5 .carta-divider { color: #b0a0f0; }

/* 6 — Amapola */
.tema-6 { background: linear-gradient(160deg, #1a0000 0%, #4a0808 50%, #7a1010 100%); color: #ffc8c8; }
.tema-6 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,100,100,0.2); box-shadow: 0 20px 60px rgba(200,30,30,0.25); }
.tema-6 .carta-num-label { background: rgba(255,100,100,0.15); color: #ff8080; }
.tema-6 .carta-titulo { color: #ffb0b0; }
.tema-6 .carta-divider { color: #ff8080; }

/* 7 — Cielo de invierno */
.tema-7 { background: linear-gradient(180deg, #0a1525 0%, #1a304a 50%, #1a3a5a 100%); color: #c8ddf5; }
.tema-7 .carta-sobre { background: rgba(255,255,255,0.07); border: 1px solid rgba(120,180,240,0.2); box-shadow: 0 20px 60px rgba(50,100,180,0.25); }
.tema-7 .carta-num-label { background: rgba(120,180,240,0.15); color: #90c0f0; }
.tema-7 .carta-titulo { color: #b0d4ff; }
.tema-7 .carta-divider { color: #90c0f0; }

/* 8 — Lavanda mágica */
.tema-8 { background: linear-gradient(160deg, #1a0a2a 0%, #3a1a5a 50%, #5a2a7a 100%); color: #e8d0f8; }
.tema-8 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(180,120,255,0.2); box-shadow: 0 20px 60px rgba(130,60,200,0.25); }
.tema-8 .carta-num-label { background: rgba(180,120,255,0.15); color: #d090f8; }
.tema-8 .carta-titulo { color: #e8c0ff; font-style: italic; }
.tema-8 .carta-divider { color: #d090f8; }

/* 9 — Ámbar cálido */
.tema-9 { background: linear-gradient(160deg, #1a0d00 0%, #4a2800 50%, #7a4800 100%); color: #ffe8b0; }
.tema-9 .carta-sobre { background: rgba(255,200,50,0.07); border: 1px solid rgba(220,160,50,0.25); box-shadow: 0 20px 60px rgba(180,110,20,0.25); }
.tema-9 .carta-num-label { background: rgba(220,160,50,0.15); color: #e8c060; }
.tema-9 .carta-titulo { color: #ffd880; }
.tema-9 .carta-divider { color: #e8c060; }

/* 10 — Esmeralda */
.tema-10 { background: linear-gradient(160deg, #001a10 0%, #003a22 50%, #005a35 100%); color: #b0f0d0; }
.tema-10 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(50,220,140,0.2); box-shadow: 0 20px 60px rgba(20,180,100,0.2); }
.tema-10 .carta-num-label { background: rgba(50,220,140,0.15); color: #60e8a8; }
.tema-10 .carta-titulo { color: #90ffcc; }
.tema-10 .carta-divider { color: #60e8a8; }

/* 11 — Sol de mediodía */
.tema-11 { background: linear-gradient(160deg, #1a1500 0%, #4a3c00 50%, #7a6500 100%); color: #fff8b0; }
.tema-11 .carta-sobre { background: rgba(255,240,50,0.07); border: 1px solid rgba(240,210,50,0.25); box-shadow: 0 20px 60px rgba(180,160,20,0.25); }
.tema-11 .carta-num-label { background: rgba(240,210,50,0.15); color: #f0d830; }
.tema-11 .carta-titulo { color: #fff080; }
.tema-11 .carta-divider { color: #f0d830; }

/* 12 — Coral ardiente */
.tema-12 { background: linear-gradient(160deg, #1a0010 0%, #4a0030 50%, #7a0050 100%); color: #ffc0e0; }
.tema-12 .carta-sobre { background: rgba(255,150,200,0.07); border: 1px solid rgba(255,100,180,0.2); box-shadow: 0 20px 60px rgba(200,40,120,0.25); }
.tema-12 .carta-num-label { background: rgba(255,100,180,0.15); color: #ff80c8; }
.tema-12 .carta-titulo { color: #ffb0e0; font-style: italic; }
.tema-12 .carta-divider { color: #ff80c8; }

/* 13 — Agua turquesa */
.tema-13 { background: linear-gradient(160deg, #001a1a 0%, #003a3a 50%, #005a5a 100%); color: #b0f0f0; }
.tema-13 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(50,220,220,0.2); box-shadow: 0 20px 60px rgba(20,180,180,0.2); }
.tema-13 .carta-num-label { background: rgba(50,220,220,0.15); color: #60e8e8; }
.tema-13 .carta-titulo { color: #90ffff; }
.tema-13 .carta-divider { color: #60e8e8; }

/* 14 — Tierra cálida */
.tema-14 { background: linear-gradient(160deg, #1a0a00 0%, #3a1a0a 50%, #6a3a1a 100%); color: #f0d8c0; }
.tema-14 .carta-sobre { background: rgba(255,200,150,0.07); border: 1px solid rgba(200,140,80,0.25); box-shadow: 0 20px 60px rgba(150,80,20,0.3); }
.tema-14 .carta-num-label { background: rgba(200,140,80,0.15); color: #e0a860; }
.tema-14 .carta-titulo { color: #f8c890; }
.tema-14 .carta-divider { color: #e0a860; }

/* 15 — Índigo profundo */
.tema-15 { background: linear-gradient(160deg, #050520 0%, #0a0a4a 50%, #10107a 100%); color: #c8c8f8; }
.tema-15 .carta-sobre { background: rgba(255,255,255,0.05); border: 1px solid rgba(100,100,255,0.2); box-shadow: 0 20px 60px rgba(50,50,200,0.2); }
.tema-15 .carta-num-label { background: rgba(100,100,255,0.15); color: #9090f0; }
.tema-15 .carta-titulo { color: #b0b0ff; text-shadow: 0 0 20px rgba(100,100,255,0.4); }
.tema-15 .carta-divider { color: #9090f0; }

/* 16 — Jade sereno */
.tema-16 { background: linear-gradient(160deg, #051a0a 0%, #0f3a18 50%, #1a5a28 100%); color: #c0e8c8; }
.tema-16 .carta-sobre { background: rgba(255,255,255,0.06); border: 1px solid rgba(80,200,100,0.2); box-shadow: 0 20px 60px rgba(30,150,60,0.2); }
.tema-16 .carta-num-label { background: rgba(80,200,100,0.15); color: #70d880; }
.tema-16 .carta-titulo { color: #a0f0b0; }
.tema-16 .carta-divider { color: #70d880; }

/* 17 — Violeta romántico */
.tema-17 { background: linear-gradient(160deg, #1a0020 0%, #3a0045 50%, #5a0070 100%); color: #f0c0ff; }
.tema-17 .carta-sobre { background: rgba(200,100,255,0.07); border: 1px solid rgba(200,100,255,0.2); box-shadow: 0 20px 60px rgba(150,50,220,0.25); }
.tema-17 .carta-num-label { background: rgba(200,100,255,0.15); color: #e080ff; }
.tema-17 .carta-titulo { color: #f0a0ff; font-style: italic; }
.tema-17 .carta-divider { color: #e080ff; }

/* 18 — Dorado nocturno */
.tema-18 { background: linear-gradient(160deg, #0d0800 0%, #2a1e00 50%, #4a3600 100%); color: #ffeea0; }
.tema-18 .carta-sobre { background: rgba(255,230,100,0.07); border: 1px solid rgba(220,190,50,0.3); box-shadow: 0 20px 60px rgba(180,140,20,0.3); }
.tema-18 .carta-num-label { background: rgba(220,190,50,0.15); color: #ddb830; }
.tema-18 .carta-titulo { color: #ffe070; text-shadow: 0 0 30px rgba(220,180,50,0.5); }
.tema-18 .carta-divider { color: #ddb830; }

/* 19 — Cumpleaños: rojo y oro puro */
.tema-19 { background: radial-gradient(ellipse at 30% 20%, #3d0010, #0d0005 60%); color: #ffe8d0; }
.tema-19 .carta-sobre { background: rgba(255,200,50,0.06); border: 1px solid rgba(220,160,50,0.35); box-shadow: 0 30px 80px rgba(180,20,50,0.35), 0 0 100px rgba(220,160,50,0.1); }

/* Estrellas de fondo para carta 19 */
.star-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.star-bg span {
  position: absolute; width: 2px; height: 2px;
  background: rgba(255,220,100,0.6); border-radius: 50%;
  animation: twinkle 2s ease infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* Animación corazones flotantes en carta especial */
.heart-float {
  position: fixed; font-size: 1.4rem; pointer-events: none;
  animation: heart-rise 4s ease-in infinite;
  z-index: 0;

@keyframes heart-rise {
  0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
  20%  { opacity: 0.8; }
  80%  { opacity: 0.4; }
  100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
}

/* Responsive */
@media (max-width: 380px) {
  .carta-titulo { font-size: 1.6rem; }
  .carta-texto  { font-size: 0.98rem; }

/* Toast */

function renderGrid() {
  const grid = document.getElementById('cartas-grid');
  grid.innerHTML = '';
  cartasData.forEach((carta, i) => {
    const div = document.createElement('div');
    div.className = `carta-card ${temas[i]}`;
    div.innerHTML = `
      <span class="card-num">#${carta.id}</span>
      <span class="card-tag">${carta.emoji}</span>
      <div class="card-date">${carta.fecha}</div>
      <div class="card-title">${carta.titulo}</div>
    `;
    div.onclick = () => abrirEditor(carta.id);
    grid.appendChild(div);
  });
}

// ── EDITOR ───────────────────────────────────────────────────────────────

  editandoId = id;
  const carta = cartasData.find(c => c.id === id);
  document.getElementById('editor-title').textContent = `✏️ Carta ${id} — ${carta.fecha}`;
  document.getElementById('editor-textarea').value = getTexto(id);
  document.getElementById('editor-modal').classList.add('open');
}

function cerrarEditor() {
  document.getElementById('editor-modal').classList.remove('open');
  editandoId = null;
}

function guardarEdicion() {
  const texto = document.getElementById('editor-textarea').value;
  cartasEditadas[editandoId] = texto;
  localStorage.setItem('cartasEditadas', JSON.stringify(cartasEditadas));
  cerrarEditor();
  mostrarToast('✅ Guardado');
}

function verCartaDesdeEditor() {
  // Guarda temporalmente y muestra la carta
  const texto = document.getElementById('editor-textarea').value;
  cartasEditadas[editandoId] = texto;
  const id = editandoId;
  cerrarEditor();
  mostrarCarta(id, true);
}

// ── QR ───────────────────────────────────────────────────────────────────

  qrActualId = editandoId;
  cerrarEditor();
  mostrarModalQR(qrActualId);
}

function mostrarModalQR(id) {
  qrActualId = id;
  const url = generarUrl(id);
  document.getElementById('qr-desc').textContent = `Carta ${id} de 19 — ${cartasData.find(c=>c.id===id).fecha}`;
  document.getElementById('qr-url-text').textContent = url;

  const canvas = document.getElementById('qr-canvas');
  canvas.innerHTML = '';
  new QRCode(canvas, {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#2d0a14',
    colorLight: '#fff5f0',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('qr-modal').classList.add('open');
}

function cerrarQR() {
  document.getElementById('qr-modal').classList.remove('open');
}

function copiarUrl() {
  navigator.clipboard.writeText(document.getElementById('qr-url-text').textContent)

  let particles = '';
  const particleEmojis = esEspecial
    ? ['✨','💛','⭐','🌟','💫']
    : ['✦','·','◦','∘','✧'];
  for (let i = 0; i < 12; i++) {
    const left  = Math.random() * 100;
    const size  = 0.7 + Math.random() * 0.8;
    const delay = Math.random() * 8;
    const dur   = 6 + Math.random() * 6;
    const em    = particleEmojis[Math.floor(Math.random() * particleEmojis.length)];
    particles += `<div class="particle" style="left:${left}%;font-size:${size}rem;animation-delay:${delay}s;animation-duration:${dur}s">${em}</div>`;
  }

  cv.innerHTML = `
    ${extraHtml}
    ${particles}
    <div class="carta-wrapper">
      <div class="carta-sobre">
        <div class="carta-deco-top">
          <span class="carta-deco-emoji">${carta.emoji}</span>
          <div class="carta-num-label">${carta.dias}</div>
        </div>
        <div class="carta-fecha">${carta.fecha}</div>
        <div class="carta-titulo">${carta.titulo}</div>
        <div class="carta-divider">${divisor}</div>
        <div class="carta-texto">${texto.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="carta-divider" style="margin-top:24px">${divisor}</div>
        <div class="carta-firma">${carta.firma}</div>
      </div>
    </div>
    <button class="carta-back-btn" id="back-btn" onclick="volverAdmin()">← Volver</button>
  `;

  if (modoPreview) {
    document.getElementById('back-btn').style.display = 'block';
  }

  window.scrollTo(0, 0);
}

function volverAdmin() {
  document.getElementById('carta-view').style.display = 'none';
  document.getElementById('carta-view').innerHTML = '';
  document.getElementById('admin-view').style.display = 'block';
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function exportarLinks() {
  const links = cartasData.map(c => `Carta ${c.id} (${c.fecha}): ${generarUrl(c.id)}`).join('\n');
  navigator.clipboard.writeText(links).then(() => mostrarToast('✅ Todos los links copiados'));
}

function verTodasLasCartas() {
  abrirEditor(1);
}

// ── DETECCIÓN DE QR / URL ─────────────────────────────────────────────────
function init() {
  const params = new URLSearchParams(window.location.search);
  const cartaId = parseInt(params.get('carta'));
  if (cartaId && cartaId >= 1 && cartaId <= 19) {
    mostrarCarta(cartaId, false);
  } else {
    renderGrid();
  }
}

init();
</script>
</body>
</html>
